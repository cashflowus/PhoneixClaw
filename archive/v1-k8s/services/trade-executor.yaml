apiVersion: apps/v1
kind: Deployment
metadata:
  name: trade-executor
  namespace: phoenixtrader
  labels:
    app: trade-executor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trade-executor
  template:
    metadata:
      labels:
        app: trade-executor
    spec:
      containers:
        - name: trade-executor
          image: phoenixtrader/trade-executor:latest
          ports:
            - containerPort: 8008
          envFrom:
            - configMapRef:
                name: phoenixtrader-config
            - secretRef:
                name: phoenixtrader-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: trade-executor
  namespace: phoenixtrader
spec:
  selector:
    app: trade-executor
  ports:
    - port: 8008
      targetPort: 8008
