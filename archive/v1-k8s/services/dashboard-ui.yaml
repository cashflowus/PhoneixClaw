apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-ui
  namespace: phoenixtrader
  labels:
    app: dashboard-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-ui
  template:
    metadata:
      labels:
        app: dashboard-ui
    spec:
      containers:
        - name: dashboard-ui
          image: phoenixtrader/dashboard-ui:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-ui
  namespace: phoenixtrader
spec:
  selector:
    app: dashboard-ui
  ports:
    - port: 80
      targetPort: 80
