apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-ingestor
  namespace: phoenixtrader
  labels:
    app: discord-ingestor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discord-ingestor
  template:
    metadata:
      labels:
        app: discord-ingestor
    spec:
      containers:
        - name: discord-ingestor
          image: phoenixtrader/discord-ingestor:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: phoenixtrader-config
            - secretRef:
                name: phoenixtrader-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: discord-ingestor
  namespace: phoenixtrader
spec:
  selector:
    app: discord-ingestor
  ports:
    - port: 8002
      targetPort: 8002
