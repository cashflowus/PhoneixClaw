apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: phoenixtrader
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: phoenixtrader/notification-service:latest
          ports:
            - containerPort: 8010
          envFrom:
            - configMapRef:
                name: phoenixtrader-config
            - secretRef:
                name: phoenixtrader-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: phoenixtrader
spec:
  selector:
    app: notification-service
  ports:
    - port: 8010
      targetPort: 8010
