apiVersion: v1
kind: ConfigMap
metadata:
  name: phoenixtrader-config
  namespace: phoenixtrader
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka.phoenixtrader.svc.cluster.local:9092"
  DATABASE_URL: "postgresql+asyncpg://phoenixtrader:localdev@postgres.phoenixtrader.svc.cluster.local:5432/phoenixtrader"
  REDIS_URL: "redis://redis.phoenixtrader.svc.cluster.local:6379"
  LOG_LEVEL: "INFO"
  APPROVAL_MODE: "auto"
