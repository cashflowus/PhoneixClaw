apiVersion: v1
kind: ConfigMap
metadata:
  name: copytrader-config
  namespace: copytrader
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka.copytrader.svc.cluster.local:9092"
  DATABASE_URL: "postgresql+asyncpg://copytrader:localdev@postgres.copytrader.svc.cluster.local:5432/copytrader"
  REDIS_URL: "redis://redis.copytrader.svc.cluster.local:6379"
  LOG_LEVEL: "INFO"
  APPROVAL_MODE: "auto"
