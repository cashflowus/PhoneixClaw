apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: copytrader
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: copytrader/auth-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: copytrader-config
            - secretRef:
                name: copytrader-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: copytrader
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
