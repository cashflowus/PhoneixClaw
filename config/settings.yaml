# Trading Bot Configuration

# Safety Limits
max_position_size: 10  # Maximum contracts per position
max_daily_loss: 1000.0  # Maximum daily loss in dollars
default_contract_quantity: 1  # Default quantity when not specified
enable_trading: true  # Master switch for trading

# Service Configuration
execution_poll_interval: 5  # Seconds between trade queue polls
dry_run_mode: true  # If true, validate but don't execute trades

# Position Limits
max_total_contracts: 100  # Maximum total contracts across all positions
max_notional_value: 50000.0  # Maximum notional value per position

# Ticker Blacklist (comma-separated)
ticker_blacklist: []
