# Nightly CI — full regression + load tests. Runs at 03:00 UTC.
name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  full-regression:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio

      - name: Run regression tests
        env:
          JWT_SECRET_KEY: test-secret-key
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: sqlite+aiosqlite:///test.db
        run: |
          pytest tests/regression/ -v --tb=short -x
        continue-on-error: true

  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust websockets

      - name: Run Locust load test
        run: |
          cd tests/load && locust -f locustfile_v2.py --headless -u 10 -r 2 -t 30s --host http://localhost:8011 || true

      - name: Run WebSocket load test
        run: |
          python tests/load/ws_load.py || true
        continue-on-error: true
