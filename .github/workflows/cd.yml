name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push all v2 services
        run: |
          SERVICES=(
            "phoenix-api:apps/api/Dockerfile"
            "phoenix-dashboard:apps/dashboard/Dockerfile"
            "phoenix-bridge:openclaw/bridge/Dockerfile"
            "phoenix-ws-gateway:services/ws-gateway/Dockerfile"
            "phoenix-execution:services/execution/Dockerfile"
            "phoenix-automation:services/automation/Dockerfile"
            "phoenix-orchestrator:services/orchestrator/Dockerfile"
            "phoenix-global-monitor:services/global-monitor/Dockerfile"
            "phoenix-connector-manager:services/connector-manager/Dockerfile"
            "phoenix-backtest-runner:services/backtest-runner/Dockerfile"
            "phoenix-skill-sync:services/skill-sync/Dockerfile"
            "phoenix-agent-comm:services/agent-comm/Dockerfile"
            "phoenix-position-monitor:services/position-monitor/Dockerfile"
            "phoenix-comms:services/comms/Dockerfile"
            "phoenix-code-executor:services/code-executor/Dockerfile"
          )
          for entry in "${SERVICES[@]}"; do
            IFS=":" read -r svc dockerfile <<< "$entry"
            echo "Building $svc..."
            docker build -t ghcr.io/${{ github.repository }}/$svc:${{ github.ref_name }} -f $dockerfile .
            docker push ghcr.io/${{ github.repository }}/$svc:${{ github.ref_name }}
          done
      - name: Deploy to Coolify
        run: |
          echo "Trigger Coolify deployment via webhook"
          # curl -X POST "$COOLIFY_WEBHOOK_URL" -H "Authorization: Bearer $COOLIFY_TOKEN"
