# Phoenix v2 CI — Lint, test, build all v2 services.
# M1.1: Includes apps/api, apps/dashboard, and all v2 services.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check shared/ services/ apps/ tests/ openclaw/

  test-api:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run unit tests
        run: PYTHONPATH=. python -m pytest tests/unit/ -v --tb=short
      - name: Run Phoenix v2 API tests
        run: PYTHONPATH=. python -m pytest apps/api/tests/ -v --tb=short

  test-dashboard:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dashboard deps
        run: cd apps/dashboard && npm install
      - name: Run dashboard tests
        run: cd apps/dashboard && npm run test

  regression:
    runs-on: ubuntu-latest
    needs: [test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run regression tests
        run: PYTHONPATH=. python -m pytest tests/regression/ -v --tb=short

  build-v2:
    runs-on: ubuntu-latest
    needs: [test-api, test-dashboard]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: phoenix-api
            context: .
            dockerfile: apps/api/Dockerfile
          - service: phoenix-dashboard
            context: .
            dockerfile: apps/dashboard/Dockerfile
          - service: phoenix-bridge
            context: .
            dockerfile: openclaw/bridge/Dockerfile
          - service: phoenix-ws-gateway
            context: .
            dockerfile: services/ws-gateway/Dockerfile
          - service: phoenix-execution
            context: .
            dockerfile: services/execution/Dockerfile
          - service: phoenix-automation
            context: .
            dockerfile: services/automation/Dockerfile
          - service: phoenix-orchestrator
            context: .
            dockerfile: services/orchestrator/Dockerfile
          - service: phoenix-global-monitor
            context: .
            dockerfile: services/global-monitor/Dockerfile
          - service: phoenix-connector-manager
            context: .
            dockerfile: services/connector-manager/Dockerfile
          - service: phoenix-backtest-runner
            context: .
            dockerfile: services/backtest-runner/Dockerfile
          - service: phoenix-skill-sync
            context: .
            dockerfile: services/skill-sync/Dockerfile
          - service: phoenix-agent-comm
            context: .
            dockerfile: services/agent-comm/Dockerfile
          - service: phoenix-position-monitor
            context: .
            dockerfile: services/position-monitor/Dockerfile
          - service: phoenix-comms
            context: .
            dockerfile: services/comms/Dockerfile
          - service: phoenix-code-executor
            context: .
            dockerfile: services/code-executor/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: phoenixtrader/${{ matrix.service }}:${{ github.sha }}
